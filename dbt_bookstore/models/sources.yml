version: 2

sources:
  - name: bookstore_silver
    description: Canonical Silver outputs produced by the declarative bookstore pipeline.
    database: "{{ var('source_catalog', target.database) }}"
    schema: "{{ var('source_schema', 'bookstore_eng_pro') }}"
    tables:
      - name: orders_silver
        description: Valid parsed bookstore order events.
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 15, period: minute}
            error_after: {count: 30, period: minute}
        columns:
          - name: order_id
            data_type: string
            data_tests:
              - not_null
          - name: order_timestamp
            data_type: timestamp
            data_tests:
              - not_null
          - name: customer_id
            data_type: string
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('bookstore_silver', 'customers_silver')
                    field: customer_id
          - name: quantity
            data_type: bigint
            data_tests:
              - not_null
          - name: total
            data_type: bigint
            data_tests:
              - not_null
          - name: books
            data_type: array<struct<book_id:string,quantity:bigint,subtotal:bigint>>
            data_tests:
              - not_null
          - name: _loaded_at
            data_type: timestamp
            data_tests:
              - not_null

      - name: customers_silver
        description: Current customer state produced by the customer Auto CDC flow.
        columns:
          - name: customer_id
            data_type: string
            data_tests:
              - not_null
              - unique
          - name: country
            data_type: string
            data_tests:
              - not_null

      - name: books_silver
        description: SCD Type 2 book history produced by the books Auto CDC flow.
        columns:
          - name: book_id
            data_type: string
            data_tests:
              - not_null
          - name: title
            data_type: string
            data_tests:
              - not_null
          - name: author
            data_type: string
            data_tests:
              - not_null
          - name: price
            data_type: double
            data_tests:
              - not_null
          - name: __START_AT
            data_type: timestamp
            quote: true
            data_tests:
              - not_null
          - name: __END_AT
            data_type: timestamp
            quote: true
          - name: is_quarantined
            data_type: boolean
            data_tests:
              - not_null
